<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR CV · Ronald Herrera — Próximamente</title>
  <meta name="description" content="Una experiencia de Realidad Aumentada única para explorar el CV de Ronald Herrera. Próximamente disponible." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,700;9..40,800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #101010;
      --text:  #eae5ca;
      --muted: rgba(234, 229, 202, 0.55);
      --blue:  #a7d5f5;
      --gold:  #c4ab57;
      --red:   #ed8e6a;
      --line:  rgba(234, 229, 202, 0.1);
      --font:  'DM Sans', sans-serif;
    }

    html, body {
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.04; mix-blend-mode: overlay;
    }

    ::selection { background: var(--gold); color: var(--bg); }
    a { color: inherit; text-decoration: none; }

    /* ══════════════════════════════
       PÁGINA — centrada en pantalla
    ══════════════════════════════ */
    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2dvh 2rem;
      position: relative;
      gap: 0;
    }

    /* ── Línea decorativa superior ── */
    .page::before {
      content: '';
      position: fixed; top: 0; left: 0;
      width: 100%; height: 1px;
      background: var(--line);
      pointer-events: none;
    }

    /* ── Línea decorativa inferior ── */
    .page::after {
      content: '';
      position: fixed; bottom: 0; left: 0;
      width: 100%; height: 1px;
      background: var(--line);
      pointer-events: none;
    }

    /* ══════════════════════════════
       TAG
    ══════════════════════════════ */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 2dvh;
    }

    .tag-line {
      width: 1.8rem; height: 1px;
      background: var(--gold);
      flex-shrink: 0;
    }

    .tag-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
      animation: blink 2.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.5); }
    }

    /* ══════════════════════════════
       FRAME AR — centrado, decorativo
    ══════════════════════════════ */
    .ar-frame {
      position: relative;
      width: clamp(60px, 10dvh, 90px);
      height: clamp(60px, 10dvh, 90px);
      margin-bottom: 2dvh;
      flex-shrink: 0;
    }

    .scan-c {
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--blue);
      border-style: solid;
      opacity: 0.6;
    }

    .scan-c.tl { top: 0; left: 0;  border-width: 1.5px 0 0 1.5px; }
    .scan-c.tr { top: 0; right: 0; border-width: 1.5px 1.5px 0 0; }
    .scan-c.bl { bottom: 0; left: 0;  border-width: 0 0 1.5px 1.5px; }
    .scan-c.br { bottom: 0; right: 0; border-width: 0 1.5px 1.5px 0; }

    .scan-line {
      position: absolute;
      left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
      box-shadow: 0 0 6px var(--blue);
      animation: scanAnim 2.8s ease-in-out infinite;
    }

    @keyframes scanAnim {
      0%   { top: 0;    opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.8; }
      100% { top: 100%; opacity: 0; }
    }

    .ar-frame-inner {
      position: absolute;
      inset: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scan-icon {
      font-size: clamp(1.4rem, 5dvh, 2.2rem);
      filter: saturate(0.5);
      animation: float 3.5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    /* ══════════════════════════════
       HEADLINE
    ══════════════════════════════ */
    .headline {
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      margin-bottom: 1.5dvh;
    }

    /* En mobile el título grande */
    .line-outline {
      display: block;
      font-size: clamp(2rem, 10vw, 5rem);
      color: rgba(234, 229, 202, 0.28);
      margin-bottom: 0.05em;
    }

    .line-solid {
      display: block;
      font-size: clamp(2rem, 10vw, 5rem);
      background: linear-gradient(175deg, #fff 0%, #eae5ca 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .dot-red {
      color: var(--red);
      -webkit-text-fill-color: var(--red);
    }

    /* "Próximamente" — tratado como subtítulo separado */
    .coming-soon {
      font-size: clamp(0.58rem, 1.8vw, 0.72rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5dvh;
    }

    /* ══════════════════════════════
       SEPARADOR
    ══════════════════════════════ */
    .divider {
      width: 2.5rem; height: 1px;
      background: var(--line);
      margin: 0 auto 1.5dvh;
    }

    /* ══════════════════════════════
       DESCRIPCIÓN
    ══════════════════════════════ */
    .desc {
      font-size: clamp(0.78rem, 2.5vw, 0.88rem);
      font-weight: 400;
      color: var(--muted);
      line-height: 1.55;
      max-width: 340px;
      margin: 0 auto 1.5dvh;
    }

    /* ══════════════════════════════
       CHIPS
    ══════════════════════════════ */
    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      justify-content: center;
      max-width: 380px;
      margin: 0 auto 2dvh;
    }

    .chip {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid rgba(234, 229, 202, 0.1);
      padding: 0.28rem 0.7rem;
      border-radius: 2px;
    }

    /* ══════════════════════════════
       CTA
    ══════════════════════════════ */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.65rem 1.7rem;
      border: 0.5px solid rgba(234, 229, 202, 0.35);
      border-radius: 100px;
      font-family: var(--font);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      background: transparent;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1),
                  border-color 0.3s, color 0.3s;
    }

    .cta-btn svg { transition: transform 0.35s ease; flex-shrink: 0; }

    .cta-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(196, 171, 87, 0.6);
      color: var(--gold);
    }
    .cta-btn:hover svg { transform: translateX(-3px); stroke: var(--gold); }

    /* ══════════════════════════════
       FOOTER
    ══════════════════════════════ */
    .footer {
      margin-top: 2dvh;
      font-size: 0.56rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(234, 229, 202, 0.18);
      pointer-events: none;
      flex-shrink: 0;
    }

    /* ══════════════════════════════
       DESKTOP
    ══════════════════════════════ */
    @media (min-width: 700px) {
      .line-outline, .line-solid { font-size: clamp(3rem, 7vw, 5.5rem); }
      .desc { max-width: 420px; }
      .features { max-width: 460px; }
    }
  </style>
</head>
<body>

  <main class="page">

    <!-- Tag -->
    <div class="tag">
      <span class="tag-line"></span>
      <span class="tag-dot"></span>
      En desarrollo · AR Experience
      <span class="tag-line"></span>
    </div>

    <!-- Frame AR decorativo -->
    <div class="ar-frame">
      <div class="scan-c tl"></div>
      <div class="scan-c tr"></div>
      <div class="scan-c bl"></div>
      <div class="scan-c br"></div>
      <div class="scan-line"></div>
      <div class="ar-frame-inner">
        <span class="scan-icon">📱</span>
      </div>
    </div>

    <!-- Título -->
    <h1 class="headline">
      <span class="line-outline">Realidad</span>
      <span class="line-solid">Aumentada<span class="dot-red">.</span></span>
    </h1>

    <!-- Subtítulo "Próximamente" -->
    <p class="coming-soon">Próximamente</p>

    <div class="divider"></div>

    <!-- Descripción -->
    <p class="desc">
      Estoy construyendo una experiencia inmersiva para explorar mi perfil profesional en 3D, apuntando la cámara de tu móvil.
    </p>

    <!-- Chips -->
    <div class="features">
      <span class="chip">Perfil 3D</span>
      <span class="chip">Proyectos en AR</span>
      <span class="chip">Skills</span>
      <span class="chip">UX / UI Design</span>
    </div>

    <!-- CTA -->
    <a href="https://www.ronaldherrera.es" class="cta-btn" id="btn-portfolio">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      <span>Ver portfolio</span>
    </a>

  </main>

  <footer class="footer">Ronald Herrera · ronaldherrera.es</footer>

</body>
</html>
